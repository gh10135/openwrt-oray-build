name: Compile luci-app-phtunnel (R2S)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          repository: OrayOS/OpenOray
          path: OpenOray

      - name: Download OpenWrt SDK (rockchip/armv8)
        run: |
          wget -q https://downloads.openwrt.org/releases/24.10.5/targets/rockchip/armv8/openwrt-sdk-24.10.5-rockchip-armv8_gcc13.3.0_musl_eabi.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV

      - name: Copy plugin into SDK
        run: |
          mkdir -p ${{ env.SDK_DIR }}/package/luci-app-phtunnel
          cp -r OpenOray/luci-app-phtunnel ${{ env.SDK_DIR }}/package/

      - name: Update feeds
        run: |
          cd ${{ env.SDK_DIR }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cd ${{ env.SDK_DIR }}
          make defconfig

      - name: Compile
        run: |
          cd ${{ env.SDK_DIR }}
          make -j$(nproc) package/luci-app-phtunnel/compile V=s 2>&1 | tee build.log

      - name: Find ipk
        id: find_ipk
        run: |
          IPK=$(find . -name "luci-app-phtunnel*.ipk" 2>/dev/null | head -1)
          echo "ipk_path=$IPK" >> $GITHUB_OUTPUT
          echo "Found: $IPK"

      - name: Upload artifact
        if: steps.find_ipk.outputs.ipk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-phtunnel-r2s-ipk
          path: ${{ steps.find_ipk.outputs.ipk_path }}
