name: Compile luci-app-phtunnel (R2S)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          repository: OrayOS/OpenOray
          path: OpenOray

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pyelftools

      - name: Download OpenWrt SDK (rockchip/armv8)
        run: |
          wget -q https://downloads.openwrt.org/releases/24.10.5/targets/rockchip/armv8/openwrt-sdk-24.10.5-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar -xf openwrt-sdk-*.tar.zst
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV

      - name: Copy plugin into SDK
        run: |
          mkdir -p ${{ env.SDK_DIR }}/package/luci-app-phtunnel
          mkdir -p ${{ env.SDK_DIR }}/package/phtunnel
          cp -r OpenOray/luci-app-phtunnel ${{ env.SDK_DIR }}/package/
          cp -r OpenOray/phtunnel ${{ env.SDK_DIR }}/package/

      - name: Update feeds
        run: |
          cd ${{ env.SDK_DIR }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cd ${{ env.SDK_DIR }}
          make defconfig

      - name: Compile phtunnel first
        run: |
          cd ${{ env.SDK_DIR }}
          make -j$(nproc) package/phtunnel/compile V=s 2>&1 | tee build-phtunnel.log

      - name: Compile luci-app-phtunnel
        run: |
          cd ${{ env.SDK_DIR }}
          make -j$(nproc) package/luci-app-phtunnel/compile V=s 2>&1 | tee build.log

      - name: Find ipk
        id: find_ipk
        run: |
          IPK=$(find . -name "*phtunnel*.ipk" -o -name "luci-app-phtunnel*.ipk" 2>/dev/null)
          echo "ipk_path=$IPK" >> $GITHUB_OUTPUT
          echo "Found: $IPK"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ipk-packages
          path: ${{ env.SDK_DIR }}/bin/packages/aarch64_generic/**/*.ipk
