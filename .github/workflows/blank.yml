name: Build OpenOray IPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git \
          libncurses-dev libssl-dev python3-distutils \
          rsync unzip zlib1g-dev file wget subversion

    - name: 克隆 OpenWrt 源码
      run: |
        git clone --depth=1 --branch openwrt-23.05 https://github.com/openwrt/openwrt.git
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 克隆 OpenOray 包
      run: |
        cd openwrt
        mkdir -p package/openwrt-packages
        cd package/openwrt-packages
        git clone https://github.com/OrayOS/OpenOray

    - name: 配置编译
      run: |
        cd openwrt
        cat > .config << 'EOF'
        CONFIG_TARGET_x86=y
        CONFIG_TARGET_x86_64=y
        EOF
        echo "CONFIG_PACKAGE_luci-app-phtunnel=m" >> .config
        echo "CONFIG_PACKAGE_phtunnel=m" >> .config
        echo "CONFIG_PACKAGE_luci-app-pgyvpn=m" >> .config
        echo "CONFIG_PACKAGE_pgyvpn=m" >> .config
        make defconfig

    - name: 安装 host 工具
      run: |
        cd openwrt
        make tools/install -j$(nproc) || true
        make toolchain/install -j$(nproc) || true

    - name: 下载依赖
      run: |
        cd openwrt
        make download -j8 || true

    - name: 编译 OpenOray 包
      run: |
        cd openwrt
        make package/openwrt-packages/OpenOray/compile V=s -j$(nproc) || \
        make package/openwrt-packages/OpenOray/compile V=s -j1

    - name: 列出 IPK
      run: |
        find openwrt/bin/packages -name "*.ipk" || echo "没有找到 IPK 文件"

    - name: 上传 IPK
      uses: actions/upload-artifact@v4
      with:
        name: openoray-ipk-all
        path: openwrt/bin/packages/**/*.ipk
        if-no-files-found: warn
